<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trollskull Tavern Management</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <style>
        table td[contenteditable="true"] {
            cursor: text;
            background-color: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid #444;
            transition: background-color 0.2s;
        }
        table td[contenteditable="true"]:focus {
            background-color: rgba(255, 255, 255, 0.15);
            outline: 1px solid #d7ba7d;
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <h1 style="margin:0; font-size: 24px;">Trollskull Manor</h1>
        <div class="top-right-controls">
            <label style="margin:0;">Current Date:</label>
            <span style="font-weight: bold; color: #d7ba7d; margin-right: 15px;" id="global_date_display"></span>
            <button class="save-btn" style="background-color: #007acc;" onclick="advanceDate()">Advance Day</button>
            <button class="save-btn" onclick="saveDay()">Save Day to Ledger</button>
        </div>
    </div>

    <nav>
        <button onclick="switchTab('dashboard')">DASHBOARD</button>
        <button onclick="switchTab('inventory')">INVENTORY</button>
        <button onclick="switchTab('staff')">STAFF</button>
        <button onclick="switchTab('ledger')">LEDGER</button>
        <button onclick="switchTab('npcs')">NPC DIRECTORY</button>
        <button onclick="switchTab('reports')">REPORTS</button>
    </nav>

    <div id="dashboard" class="tab-content active-tab">
        <div style="display: flex; gap: 20px; background-color: #333; padding: 15px; border-radius: 4px;">
            <div style="flex: 1;">
                <h3>Operational Hours (0:00 - 24:00)</h3>
                <div class="form-group"><label>Open:</label><input type="number" id="open_hour" value="12" min="0" max="23"></div>
                <div class="form-group"><label>Close:</label><input type="number" id="close_hour" value="24" min="1" max="24"></div>
                <div class="form-group"><label>Close for Day:</label><input type="checkbox" id="is_closed"></div>
            </div>
            <div style="flex: 1;">
                <h3>Simulation Modifiers</h3>
                <div class="form-group"><label>Base Roll:</label><input type="number" id="base_roll" value="50"></div>
                <div class="form-group"><label>Renown:</label><input type="number" id="renown_bonus" value="0"></div>
                <div class="form-group"><label>Strategy:</label>
                    <select id="price_strategy">
                        <option value="Dive">Dive</option>
                        <option value="Standard" selected>Standard</option>
                        <option value="Premium">Premium</option>
                        <option value="Exclusive">Exclusive</option>
                    </select>
                </div>
                <button style="width:100%; font-size: 16px; padding: 10px;" onclick="rollOutcome()">Generate Day</button>
            </div>
            <div style="flex: 1;">
                <h3>Environment</h3>
                <div class="form-group"><label>Effect Bonus:</label><input type="number" id="env_bonus" value="0"></div>
            </div>
        </div>
        
        <div id="outcome-result" style="margin-top: 20px; padding: 15px; background-color: #222; display: none; border: 1px solid #444;">
            <h2 id="out-title" style="margin-top: 0; color: #d7ba7d;">Simulation Results</h2>
            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <h3>Daily Item Sales</h3>
                    <div id="out-sales"></div>
                </div>
                <div style="flex: 1;">
                    <h3>Hourly NPC Presence</h3>
                    <div id="out-npc-hourly" style="max-height: 400px; overflow-y: auto; background: #111; padding: 10px; border: 1px solid #333;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="inventory" class="tab-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Inventory Management</h2>
            <button onclick="syncInventoryFromCSV()" style="background-color: #d7ba7d; color: #000;">Force Sync from CSV</button>
        </div>
        <div id="inventory-container" style="overflow-x: auto; margin-top: 15px;"></div>
    </div>

    <div id="staff" class="tab-content">
        <h2>Tavern Staff</h2>
        <table style="width: 100%;">
            <thead><tr><th>Name</th><th>Wage (gp)</th><th>Freq</th><th>Bonus</th><th>Action</th></tr></thead>
            <tbody id="staff-table-body"></tbody>
        </table>
    </div>

    <div id="ledger" class="tab-content">
        <h2>Ledger History</h2>
        <table style="width: 100%;">
            <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Amount</th><th>Freq</th><th>Action</th></tr></thead>
            <tbody id="ledger-table-body"></tbody>
        </table>
    </div>
    
    <div id="npcs" class="tab-content">
        <h2>NPC Directory</h2>
        <div id="npc-container" style="overflow-x: auto;"></div>
    </div>

    <script src="/static/js/globals.js?v=3"></script>
    <script src="/static/js/inventory.js?v=3"></script>
    <script src="/static/js/staff.js?v=3"></script>
    <script src="/static/js/npcs.js?v=3"></script>
    <script src="/static/js/ledger.js?v=3"></script>
    <script src="/static/js/dashboard.js?v=3"></script>
</body>
</html>
